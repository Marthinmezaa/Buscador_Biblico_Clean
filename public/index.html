<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador Bíblico | ¿Cómo te sentís hoy?</title>
    <link rel="stylesheet" href="estilos.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="logo">Buscador Bíblico</div>
      <button id="btn-menu" class="menu-hamburguesa">☰</button>
    </header>

    <aside id="menu-lateral">
      <button id="btn-cerrar-menu" class="btn-cerrar">&times;</button>

      <div id="contenedor-etiquetas"></div>
    </aside>

    <main>
      <section class="seccion-buscador">
        <h1 class="titulo-principal">¿Cómo te sentís hoy?</h1>
        <p class="subtitulo">
          Escribe una emoción (ej: ansiedad, miedo, paz) o usa el menú lateral.
        </p>

        <div class="caja-busqueda">
          <input
            type="text"
            id="input-busqueda"
            placeholder="Me siento..."
            autocomplete="off"
          />
          <button id="btn-buscar" class="btn-primario">Buscar</button>
        </div>
      </section>
      <p id="indicador-busqueda"></p>
      <section id="contenedor-resultados" class="grid-resultados"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
